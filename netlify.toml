[build]
  command = "npm run build:staging && npm run verify:build-env"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.17.0"
  VITE_PAYMENTS_DISABLED = "true"

[context.production]
  command = "npm run build:live && npm run verify:build-env"

[context.production.environment]
  VITE_PAYMENTS_DISABLED = "false"

[context.branch-deploy]
  command = "npm run build:staging && npm run verify:build-env"

[context.branch-deploy.environment]
  VITE_PAYMENTS_DISABLED = "true"

[context.deploy-preview]
  command = "npm run build:staging && npm run verify:build-env"

[context.deploy-preview.environment]
  VITE_PAYMENTS_DISABLED = "true"

[functions."send-scheduled-emails"]
  schedule = "* * * * *"

[[redirects]]
  from = "/supabase/*"
  to = "/404"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/push-sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
