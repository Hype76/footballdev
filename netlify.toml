[build]
  command = "npm run build:live && npm run verify:build-env"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.17.0"
  VITE_PAYMENTS_DISABLED = "true"

[build.processing.html]
  pretty_urls = false

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[context.production]
  command = "npm run build:live && npm run verify:build-env"

[context.production.environment]
  VITE_PAYMENTS_DISABLED = "false"

[context.branch-deploy]
  command = "node scripts/staging-retired.mjs branch-deploy"

[context.branch-deploy.environment]
  VITE_PAYMENTS_DISABLED = "true"

[context.deploy-preview]
  command = "npm run build:live && npm run verify:build-env"

[context.deploy-preview.environment]
  VITE_PAYMENTS_DISABLED = "true"

[[redirects]]
  from = "/supabase/*"
  to = "/404"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; connect-src 'self' https://hvapkizujvsahvgspser.supabase.co wss://hvapkizujvsahvgspser.supabase.co; font-src 'self' https://fonts.gstatic.com; form-action 'self'; frame-ancestors 'none'; frame-src 'none'; img-src 'self' data: blob: https://hvapkizujvsahvgspser.supabase.co; manifest-src 'self'; media-src 'self' data: blob: https://hvapkizujvsahvgspser.supabase.co; object-src 'none'; script-src 'self' 'sha256-gFxI4Ow5y43sJk7XGw6ATe67pBxbTSHUs2uHBtyURyw=' 'sha256-5EuaeVic8mgPp95f2I13eLmlte+xb53nlpd2V5AW2tM='; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; worker-src 'self' blob:; upgrade-insecure-requests"
    Cross-Origin-Opener-Policy = "same-origin"
    Cross-Origin-Resource-Policy = "same-origin"
    Permissions-Policy = "accelerometer=(), autoplay=(), camera=(), display-capture=(), encrypted-media=(), geolocation=(), gyroscope=(), magnetometer=(), microphone=(self), payment=(), publickey-credentials-get=(self), usb=()"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/javascript; charset=utf-8"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/push-sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Content-Type = "application/manifest+json; charset=utf-8"
